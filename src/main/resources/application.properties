# Server Port (Render will provide a port, otherwise fallback to 8080)
server.port=${PORT:8080}

# Database Connection (Looks for Cloud Variables, falls back to your local DB)
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/ims?serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}

# Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true