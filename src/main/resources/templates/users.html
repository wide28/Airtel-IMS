<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>IMS - Manage Users</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">

    <nav class="bg-blue-800 p-4 text-white flex justify-between items-center shadow-md">
        <div class="flex items-center space-x-8">
            <div class="text-xl font-bold border-r border-blue-600 pr-6">Airtel IMS</div>
            <a th:href="@{/dashboard}" class="hover:text-blue-200 font-medium transition">Equipment</a>
            <a th:href="@{/users}" class="text-blue-200 font-bold border-b-2 border-blue-200">Admin Panel</a>
        </div>
        <div>
            <a th:href="@{/login}" class="bg-red-500 hover:bg-red-600 px-4 py-2 rounded text-sm font-bold shadow transition">Logout</a>
        </div>
    </nav>

    <div class="container mx-auto mt-8 p-4">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-2xl font-bold text-gray-800">System Users Management</h2>
            <a th:href="@{/users/add}" class="bg-purple-600 hover:bg-purple-700 text-white font-bold py-2 px-4 rounded shadow transition">
                + Create New User
            </a>
        </div>

        <div class="bg-white shadow-md rounded my-6 overflow-x-auto">
            <table class="min-w-full table-auto">
                <thead>
                    <tr class="bg-gray-200 text-gray-600 uppercase text-sm leading-normal">
                        <th class="py-3 px-6 text-left">Full Name</th>
                        <th class="py-3 px-6 text-left">Username</th>
                        <th class="py-3 px-6 text-center">Assigned Role</th>
                        <th class="py-3 px-6 text-center">Actions</th>
                    </tr>
                </thead>
                <tbody class="text-gray-600 text-sm font-light">
                    <tr th:each="user : ${users}" class="border-b border-gray-200 hover:bg-gray-50">
                        <td class="py-3 px-6 text-left whitespace-nowrap font-medium" th:text="${user.fullName}"></td>
                        <td class="py-3 px-6 text-left" th:text="${user.username}"></td>
                        <td class="py-3 px-6 text-center">
                            <span th:text="${user.role}" class="bg-purple-100 text-purple-800 py-1 px-3 rounded-full text-xs font-bold"></span>
                        </td>
                        <td class="py-3 px-6 text-center">
                            <div th:if="${user.role != 'SYSADMIN'}">
                                <a th:href="@{/users/delete/{id}(id=${user.id})}" onclick="return confirm('Remove this user?');" class="text-red-500 hover:text-red-700 font-bold transition">Remove</a>
                            </div>
                            <div th:if="${user.role == 'SYSADMIN'}" class="text-gray-400 italic text-xs">
                                Protected
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
