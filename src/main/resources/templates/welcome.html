<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>IMS - Welcome</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 flex items-center justify-center min-h-screen">

    <div class="max-w-2xl w-full p-8">
        <div class="bg-white rounded-2xl shadow-2xl overflow-hidden flex flex-col md:flex-row">
            <div class="bg-blue-800 md:w-1/3 p-8 flex items-center justify-center">
                <div class="text-white text-center">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-20 w-20 mx-auto opacity-50" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />
                    </svg>
                    <h2 class="mt-4 font-bold">AIRTEL IMS</h2>
                </div>
            </div>

            <div class="p-10 md:w-2/3">
                <h1 class="text-4xl font-extrabold text-gray-800 mb-2">Hello!</h1>
                <h2 class="text-xl text-blue-600 font-bold mb-6" th:text="${session.loggedInUser.fullName}">User Name</h2>
                
                <p class="text-gray-600 leading-relaxed mb-8">
                    Welcome back to the Inventory Management System. You are currently logged in with 
                    <span class="font-bold text-gray-800" th:text="${session.loggedInUser.role}">Role</span> privileges.
                </p>

                <div class="flex space-x-4">
                    <a th:href="@{/dashboard}" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition transform hover:-translate-y-1">
                        Open Dashboard
                    </a>
                    <a th:href="@{/login}" class="text-gray-400 hover:text-red-500 font-medium flex items-center">
                        Not you? Logout
                    </a>
                </div>
            </div>
        </div>
        <p class="text-center mt-6 text-gray-400 text-xs italic">Airtel Digital Asset Protection Unit &copy; 2026</p>
    </div>

</body>
</html>
