<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>IMS - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 flex items-center justify-center min-h-screen">

    <div class="w-full max-w-md">
        <div class="bg-white p-8 rounded-t-lg shadow-2xl">
            <div class="text-center mb-8">
                <div class="inline-block p-3 rounded-full bg-blue-100 mb-4">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-blue-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                    </svg>
                </div>
                <h2 class="text-2xl font-extrabold text-gray-800">Airtel IMS Login</h2>
                <p class="text-gray-500 text-sm">Enter your credentials to manage inventory</p>
            </div>

            <div th:if="${error}" class="bg-red-50 border-l-4 border-red-500 text-red-700 p-4 mb-6 rounded shadow-sm">
                <p class="text-xs font-bold" th:text="${error}"></p>
            </div>

            <form th:action="@{/login}" method="post" class="space-y-5">
                <div>
                    <label class="block text-xs font-bold text-gray-600 uppercase tracking-wider">Username</label>
                    <input type="text" name="username" required placeholder="Reg Number"
                           class="mt-1 block w-full border border-gray-300 rounded-lg p-3 focus:ring-2 focus:ring-blue-500 outline-none transition">
                </div>

                <div>
                    <label class="block text-xs font-bold text-gray-600 uppercase tracking-wider">Password</label>
                    <input type="password" name="password" required placeholder="••••••••"
                           class="mt-1 block w-full border border-gray-300 rounded-lg p-3 focus:ring-2 focus:ring-blue-500 outline-none transition">
                </div>

                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg shadow-lg transform active:scale-95 transition">
                    Sign In
                </button>
            </form>
        </div>

        <div class="bg-gray-800 p-6 rounded-b-lg shadow-2xl border-t border-gray-700">
            <h3 class="text-center text-gray-400 text-xs font-bold uppercase tracking-widest mb-4">Project Developers</h3>
            <div class="grid grid-cols-2 gap-4 text-center">
                <div>
                    <p class="text-blue-400 text-xs font-bold">Dieudonne D.</p>
                    <p class="text-gray-500 text-[10px]">24rp01734</p>
                </div>
                <div>
                    <p class="text-blue-400 text-xs font-bold">Israel D.</p>
                    <p class="text-gray-500 text-[10px]">24rp04260</p>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
