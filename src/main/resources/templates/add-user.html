<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>IMS - Add User</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">

    <div class="bg-white p-8 rounded-lg shadow-lg w-full max-w-md">
        <h2 class="text-2xl font-bold text-gray-800 mb-6 text-center">Create System User</h2>

        <div th:if="${error}" class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4 text-sm font-bold text-center">
            <span th:text="${error}"></span>
        </div>

        <form th:action="@{/users/add}" th:object="${user}" method="post" class="space-y-4">
            
            <div>
                <label class="block text-sm font-medium text-gray-700">Full Name</label>
                <input type="text" th:field="*{fullName}" required class="mt-1 block w-full border border-gray-300 rounded-md p-2">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700">Username (Login ID)</label>
                <input type="text" th:field="*{username}" required class="mt-1 block w-full border border-gray-300 rounded-md p-2">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700">Password</label>
                <input type="password" th:field="*{password}" required class="mt-1 block w-full border border-gray-300 rounded-md p-2">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700">Assign Privilege Level</label>
                <select th:field="*{role}" required class="mt-1 block w-full border border-gray-300 rounded-md p-2 bg-gray-50">
                    <option value="IT_MANAGER">IT Manager</option>
                    <option value="FINANCIER">Financier</option>
                    <option value="DEPARTMENT_HEAD">Department Head</option>
                    <option value="SUPPORT_STAFF">Support Staff</option>
                </select>
            </div>

            <div class="flex justify-between items-center mt-6">
                <a th:href="@{/users}" class="text-gray-600 hover:text-gray-900 font-medium">Cancel</a>
                <button type="submit" class="bg-purple-600 text-white font-bold py-2 px-6 rounded hover:bg-purple-700 shadow transition">
                    Create User
                </button>
            </div>
        </form>
    </div>
</body>
</html>
