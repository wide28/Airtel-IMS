<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IMS - Add Equipment</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">

    <div class="bg-white p-8 rounded-lg shadow-lg w-full max-w-lg">
        <h2 class="text-2xl font-bold text-gray-800 mb-6 text-center">Register New Equipment</h2>

        <form th:action="@{/equipment/add}" th:object="${equipment}" method="post" class="space-y-4">
            
            <div>
                <label for="serialNumber" class="block text-sm font-medium text-gray-700">Serial Number</label>
                <input type="text" id="serialNumber" th:field="*{serialNumber}" required
                       class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2 focus:ring-blue-500 focus:border-blue-500">
            </div>

            <div>
                <label for="deviceType" class="block text-sm font-medium text-gray-700">Device Type</label>
                <select id="deviceType" th:field="*{deviceType}" required
                        class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2 focus:ring-blue-500 focus:border-blue-500">
                    <option value="">Select a device type...</option>
                    <option value="Laptop">Laptop</option>
                    <option value="Desktop">Desktop</option>
                    <option value="Mobile Phone">Mobile Phone</option>
                    <option value="Tablet">Tablet</option>
                    <option value="Networking Gear">Networking Gear</option>
                </select>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label for="brand" class="block text-sm font-medium text-gray-700">Brand</label>
                    <input type="text" id="brand" th:field="*{brand}" required placeholder="e.g. Dell"
                           class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2 focus:ring-blue-500 focus:border-blue-500">
                </div>
                <div>
                    <label for="model" class="block text-sm font-medium text-gray-700">Model</label>
                    <input type="text" id="model" th:field="*{model}" required placeholder="e.g. Latitude 7420"
                           class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2 focus:ring-blue-500 focus:border-blue-500">
                </div>
            </div>

            <div>
                <label for="status" class="block text-sm font-medium text-gray-700">Condition / Status</label>
                <select id="status" th:field="*{status}" required
                        class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2 focus:ring-blue-500 focus:border-blue-500">
                    <option value="AVAILABLE">Available (In Stock)</option>
                    <option value="ASSIGNED">Assigned to User</option>
                    <option value="MAINTENANCE">In Maintenance</option>
                    <option value="BROKEN">Broken / Retired</option>
                </select>
            </div>

            <div class="flex justify-between items-center mt-6">
                <a th:href="@{/dashboard}" class="text-gray-600 hover:text-gray-900 font-medium transition">Cancel</a>
                
                <button type="submit" class="bg-green-600 text-white font-bold py-2 px-6 rounded hover:bg-green-700 transition shadow">
                    Save Equipment
                </button>
            </div>
            
        </form>
    </div>

</body>
</html>
